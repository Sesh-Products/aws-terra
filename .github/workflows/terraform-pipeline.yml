name: Terraform Pipeline

on:
  push:
    branches:
      - test-terraform
  pull_request:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev

permissions:
  contents: read

env:
  TF_VERSION: "1.6.0"
  PYTHON_VERSION: "3.12"
  ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
  AWS_REGION: "us-east-1"

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # STEP 1 — Pre-Build  (terraform/pre-build)
  # Creates Secrets Manager secrets and any bootstrap infrastructure
  # ─────────────────────────────────────────────────────────────────────────────
  pre-build:
    name: "Step 1 · Pre-Build"
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        shell: bash
        working-directory: terraform/pre-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v1
        with:
          terraform_version: ${{ env.TF_VERSION }}
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan \
            -input=false \
            -var-file="dev.tfvars" \
            -var="snowflake_private_key_path=${{ runner.temp }}/snowflake_key.p8" \
            -out=pre-build.tfplan
        env:
          # Override the secret_string values with GitHub Secrets to avoid
          # committing credentials in dev.tfvars
          TF_VAR_secrets: |
            {
              "snowflake_credentials": {
                "secret_name": "snowflake/pos-pipeline/${{ env.ENVIRONMENT }}/credentials",
                "description": "Snowflake credentials for pos-pipeline",
                "recovery_window_in_days": 0,
                "secret_string": ${{ toJSON(secrets.SNOWFLAKE_CREDENTIALS_JSON) }}
              },
              "snowflake_private_key": {
                "secret_name": "snowflake/pos-pipeline/${{ env.ENVIRONMENT }}/private-key",
                "description": "Snowflake RSA private key",
                "recovery_window_in_days": 0,
                "secret_string": ${{ toJSON(secrets.SNOWFLAKE_PRIVATE_KEY) }}
              }
            }

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: terraform apply -auto-approve -input=false pre-build.tfplan

  # ─────────────────────────────────────────────────────────────────────────────
  # STEP 2 — Post-Build  (terraform/post-build)
  # Depends on pre-build completing successfully.
  # Creates Lambda functions, S3 buckets, EC2 instances, Snowflake resources.
  # ─────────────────────────────────────────────────────────────────────────────
  post-build:
    name: "Step 2 · Post-Build"
    runs-on: ubuntu-latest
    needs: pre-build
    environment: production

    defaults:
      run:
        shell: bash
        working-directory: terraform/post-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Lambda layer dependencies
        run: |
          # Build the Snowflake connector layer used by post-build Lambda functions
          LAYER_DIR="../../src/Layers/snowflake"
          if [ -f "$LAYER_DIR/requirements.txt" ]; then
            pip install \
              -r "$LAYER_DIR/requirements.txt" \
              -t "$LAYER_DIR/python" \
              --platform manylinux2014_aarch64 \
              --only-binary=:all: \
              --python-version 3.12
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v1
        with:
          terraform_version: ${{ env.TF_VERSION }}
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan \
            -input=false \
            -var-file="dev.tfvars" \
            -out=post-build.tfplan

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: terraform apply -auto-approve -input=false post-build.tfplan
