name: Terraform Pipeline

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev

permissions:
  contents: read

env:
  TF_VERSION: "1.9.8"
  PYTHON_VERSION: "3.12"
  ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
  AWS_REGION: "us-east-1"

jobs:
  pre-build:
    name: "Step 1 · Pre-Build"
    runs-on: ubuntu-latest
    environment: dev

    defaults:
      run:
        shell: bash
        working-directory: terraform/pre-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v1
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: |
          terraform plan \
            -input=false \
            -var-file="dev.tfvars" \
            -out=pre-build.tfplan
        env:
          TF_VAR_snowflake_private_key: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
          TF_VAR_secrets: |
            {
              "snowflake_credentials": {
                "secret_name": "snowflake/pos-pipeline/${{ env.ENVIRONMENT }}/credentials",
                "description": "Snowflake credentials for pos-pipeline",
                "recovery_window_in_days": 0,
                "secret_string": ${{ toJSON(secrets.SNOWFLAKE_CREDENTIALS_JSON) }}
              },
              "snowflake_private_key": {
                "secret_name": "snowflake/pos-pipeline/${{ env.ENVIRONMENT }}/private-key",
                "description": "Snowflake RSA private key",
                "recovery_window_in_days": 0,
                "secret_string": ${{ toJSON(secrets.SNOWFLAKE_PRIVATE_KEY) }}
              }
            }

      - name: Terraform Apply
        if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || github.event_name == 'workflow_dispatch'
        run: terraform apply -auto-approve -input=false pre-build.tfplan

  post-build:
    name: "Step 2 · Post-Build"
    runs-on: ubuntu-latest
    needs: pre-build
    environment: dev

    defaults:
      run:
        shell: bash
        working-directory: terraform/post-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Lambda layer dependencies
        run: |
          LAYER_DIR="../../src/Layers/snowflake"
          if [ -f "$LAYER_DIR/requirements.txt" ]; then
            pip install \
              -r "$LAYER_DIR/requirements.txt" \
              -t "$LAYER_DIR/python" \
              --platform manylinux_2_17_aarch64 \
              --only-binary=:all: \
              --python-version 3.12
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v1
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: |
          terraform plan \
            -input=false \
            -var-file="dev.tfvars" \
            -out=post-build.tfplan
        env:
          # ── Byzzer credentials ─────────────────────────────────────────────
          # Sourced from GitHub Secrets/Vars — never hardcoded in tfvars.
          # Terraform passes these into EC2 user_data as environment variables.
          TF_VAR_byzzer_email:    ${{ secrets.BYZZER_EMAIL }}
          TF_VAR_byzzer_password: ${{ secrets.BYZZER_PASSWORD }}
          TF_VAR_byzzer_report:   ${{ vars.BYZZER_REPORT }}

      - name: Terraform Apply
        if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || github.event_name == 'workflow_dispatch'
        run: terraform apply -auto-approve -input=false post-build.tfplan
        env:
          # ── Must match Plan env vars exactly ──────────────────────────────
          TF_VAR_byzzer_email:    ${{ secrets.BYZZER_EMAIL }}
          TF_VAR_byzzer_password: ${{ secrets.BYZZER_PASSWORD }}
          TF_VAR_byzzer_report:   ${{ vars.BYZZER_REPORT }}