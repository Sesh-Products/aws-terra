name: Terraform Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod

permissions:
  contents: read

env:
  TF_VERSION: "1.9.8"
  PYTHON_VERSION: "3.12"
  ENVIRONMENT: ${{ github.event.inputs.environment || 'dev' }}
  AWS_REGION: "us-east-1"

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # STEP 1A — Pre-Build Plan
  # ─────────────────────────────────────────────────────────────────────────────
  pre-build-plan:
    name: "Step 1A · Pre-Build Plan (${{ github.event.inputs.environment || 'dev' }})"
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}

    defaults:
      run:
        shell: bash
        working-directory: terraform/pre-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v1
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="key=pre-build/${{ env.ENVIRONMENT }}/terraform.tfstate"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan \
            -input=false \
            -var-file="${{ env.ENVIRONMENT }}.tfvars" \
            -out=pre-build.tfplan
        env:
          TF_VAR_snowflake_private_key: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
          TF_VAR_secrets: |
            {
              "snowflake_credentials": {
                "secret_name": "snowflake/pos-pipeline/${{ env.ENVIRONMENT }}/credentials",
                "description": "Snowflake credentials for pos-pipeline",
                "recovery_window_in_days": 0,
                "secret_string": ${{ toJSON(secrets.SNOWFLAKE_CREDENTIALS_JSON) }}
              },
              "snowflake_private_key": {
                "secret_name": "snowflake/pos-pipeline/${{ env.ENVIRONMENT }}/private-key",
                "description": "Snowflake RSA private key",
                "recovery_window_in_days": 0,
                "secret_string": ${{ toJSON(secrets.SNOWFLAKE_PRIVATE_KEY) }}
              }
            }

      - name: Show Plan Summary
        run: terraform show -no-color pre-build.tfplan >> $GITHUB_STEP_SUMMARY

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pre-build-plan-${{ env.ENVIRONMENT }}-${{ github.run_id }}
          path: terraform/pre-build/pre-build.tfplan
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────────
  # STEP 1B — Pre-Build Apply (requires approval via GitHub Environment)
  # ─────────────────────────────────────────────────────────────────────────────
  pre-build-apply:
    name: "Step 1B · Pre-Build Apply (${{ github.event.inputs.environment || 'dev' }})"
    runs-on: ubuntu-latest
    needs: pre-build-plan
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment: ${{ github.event.inputs.environment || 'dev' }}

    defaults:
      run:
        shell: bash
        working-directory: terraform/pre-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v1
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="key=pre-build/${{ env.ENVIRONMENT }}/terraform.tfstate"

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: pre-build-plan-${{ env.ENVIRONMENT }}-${{ github.run_id }}
          path: terraform/pre-build

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false pre-build.tfplan

  # ─────────────────────────────────────────────────────────────────────────────
  # STEP 2A — Post-Build Plan
  # ─────────────────────────────────────────────────────────────────────────────
  post-build-plan:
    name: "Step 2A · Post-Build Plan (${{ github.event.inputs.environment || 'dev' }})"
    runs-on: ubuntu-latest
    needs: pre-build-plan
    environment: ${{ github.event.inputs.environment || 'dev' }}

    defaults:
      run:
        shell: bash
        working-directory: terraform/post-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Lambda layer dependencies
        run: |
          LAYER_DIR="../../src/Layers/snowflake"
          if [ -f "$LAYER_DIR/requirements.txt" ]; then
            pip install \
              -r "$LAYER_DIR/requirements.txt" \
              -t "$LAYER_DIR/python" \
              --platform manylinux_2_17_aarch64 \
              --only-binary=:all: \
              --python-version 3.12
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v1
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: |
          mkdir -p .builds
          terraform init \
            -backend-config="key=post-build/${{ env.ENVIRONMENT }}/terraform.tfstate"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan \
            -input=false \
            -var-file="${{ env.ENVIRONMENT }}.tfvars" \
            -out=post-build.tfplan
        env:
          TF_VAR_byzzer_email:     ${{ secrets.BYZZER_EMAIL }}
          TF_VAR_byzzer_password:  ${{ secrets.BYZZER_PASSWORD }}
          TF_VAR_byzzer_report:    ${{ vars.BYZZER_REPORT }}
          TF_VAR_raw_bucket_email: ${{ secrets.RAW_BUCKET_EMAIL }}

      - name: Show Plan Summary
        run: terraform show -no-color post-build.tfplan >> $GITHUB_STEP_SUMMARY

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: post-build-plan-${{ env.ENVIRONMENT }}-${{ github.run_id }}
          path: terraform/post-build/post-build.tfplan
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────────
  # STEP 2B — Post-Build Apply (requires approval via GitHub Environment)
  # ─────────────────────────────────────────────────────────────────────────────
  post-build-apply:
    name: "Step 2B · Post-Build Apply (${{ github.event.inputs.environment || 'dev' }})"
    runs-on: ubuntu-latest
    needs: [pre-build-apply, post-build-plan]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment: ${{ github.event.inputs.environment || 'dev' }}

    defaults:
      run:
        shell: bash
        working-directory: terraform/post-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Lambda layer dependencies
        run: |
          LAYER_DIR="../../src/Layers/snowflake"
          if [ -f "$LAYER_DIR/requirements.txt" ]; then
            pip install \
              -r "$LAYER_DIR/requirements.txt" \
              -t "$LAYER_DIR/python" \
              --platform manylinux_2_17_aarch64 \
              --only-binary=:all: \
              --python-version 3.12
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v1
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: |
          mkdir -p .builds
          terraform init \
            -backend-config="key=post-build/${{ env.ENVIRONMENT }}/terraform.tfstate"

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: post-build-plan-${{ env.ENVIRONMENT }}-${{ github.run_id }}
          path: terraform/post-build

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false post-build.tfplan
